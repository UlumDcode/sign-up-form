<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign Up Form</title>
  </head>
  <body>
    <!-- main container -->
    <div class="main">
      <!-- sidebar img  -->
      <div class="img-container">
        <div>
          <img id="odin-img" src="img/odin-logo.png" alt="odin logo" />
          <p id="odin-word">ODIN</p>
        </div>
        <p id="credit">
          Photo by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a
            href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
            >Unsplash</a
          >
        </p>
      </div>

      <!-- form container  -->
      <div class="form-container">
        <div class="form-header">
          <h1>
            This is not a real online service! You know you need something in
            your life like this to help you realise your deepest dreams. Sign up
            now to get started.
          </h1>
          <h1>You know you want to.</h1>
        </div>
        <div>
          <form action="" method="post">
            <fieldset>
              <h2>Let's do this!</h2>
              <div>
                <div class="input">
                  <label for="first-name">FIRST NAME</label
                  ><input id="first-name" type="text" />
                </div>

                <div class="input">
                  <label for="last-name">LAST NAME</label
                  ><input id="last-name" type="text" />
                </div>

                <div class="input">
                  <label for="email">EMAIL</label
                  ><input id="email" type="email" />
                </div>

                <div class="input">
                  <label for="no"></label>PHONE NUMBER<input
                    id="no"
                    type="no"
                  />
                </div>

                <div class="input">
                  <label for="password">PASSWORD</label
                  ><input id="password" type="password" required />
                </div>

                <div class="input">
                  <label for="confirm-password">CONFIRM PASSWORD</label
                  ><input id="confirm-password" type="password" required />
                </div>
              </div>
            </fieldset>
          </form>
          <button type="submit">Create Account</button>
          <p>Alredy haeve an account? <a href="#">Log in</a></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
